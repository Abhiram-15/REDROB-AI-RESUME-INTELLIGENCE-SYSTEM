  platform: "FILL_IN_YOUR_COMPUTE_PLATFORM"     # e.g., "AWS EC2 c5.4xlarge", "Local Windows PC"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.14.4"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 5

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini 3.5 Flash for design review, coding of rule-based features, 
  adversarial testing, and setting up reproducible pipeline constraints. No 
  candidate data was sent to external LLMs during the ranking phase.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid rule-based and local semantic ranking system with availability modifier. 
  Consists of a title matching filter (excluding consulting/services companies), 
  skill-duration-endorsement weighted score, target-experience fit decay, and local 
  SentenceTransformers embeddings. Flagged honeypots are penalized with a score floor.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
